spring.application.name=FraudCall

# Server configuration
server.port=8080

# Telco Generator Settings
# ------------------------------------------

# Event Hub Configuration
telco.generator.event-hub-name=fraudcall
telco.generator.event-hub-connection-string=${AZURE_EVENTHUB_CONNECTION_STRING:}

# Generator Settings
telco.generator.cdr-per-hour=100
telco.generator.fraud-probability=0.2
telco.generator.duration-hours=1
telco.generator.phone-number-pool-size=100000
telco.generator.sleep-interval-ms=100
telco.generator.enabled=true

# Output Mode: CONSOLE, EVENT_HUB, or BOTH
telco.generator.output-mode=EVENT_HUB

# Logging
logging.level.com.Teleco.FraudCall=INFO
